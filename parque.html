<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCE-PE | O Mistério do Parque</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Special Elite', serif;
        }

        #map-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('mapa_parque.jpeg');
            background-repeat: no-repeat; background-position: center; background-size: cover;
            z-index: 1;
        }

        .map-darkener {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2;
        }

        #narrative-container {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; max-width: 900px;
            color: #ffffff; text-align: center;
            z-index: 5; pointer-events: none;
            line-height: 1.6; font-size: 1.75rem;
            text-shadow: 3px 3px 10px rgba(0,0,0,1);
        }

        /* ÁREA DO LINK - SÓ APARECE 100% LIMPA */
        #poi-link {
            position: absolute; bottom: 110px;
            right: calc(15% + 100px); z-index: 6;
            width: 250px; height: 250px; 
            display: flex; align-items: center; justify-content: center;
            opacity: 0; 
            transition: opacity 0.8s ease-in; /* Aparece rápido após o gatilho */
            cursor: pointer; pointer-events: none;
        }

        #poi-link.full-revealed { 
            opacity: 1; 
            z-index: 25; 
            pointer-events: auto; 
        }

        #light-spot {
            position: absolute; width: 100%; height: 100%;
            backdrop-filter: brightness(3) contrast(1.2);
            -webkit-backdrop-filter: brightness(3) contrast(1.2);
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            box-shadow: 0 0 100px rgba(255,255,255,0.6);
            animation: pulseGlow 2.5s infinite;
        }

        #fog-canvas {
            position: absolute; top: 0; left: 0;
            z-index: 20; cursor: crosshair; touch-action: none;
        }

        #overlay-hint {
            position: absolute; bottom: 50px; width: 100%; text-align: center;
            color: #ffffff; z-index: 30; font-size: 1.3rem; text-transform: uppercase;
            letter-spacing: 2px; pointer-events: none; text-shadow: 2px 2px 8px #000;
            transition: opacity 1s ease;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.08); filter: brightness(1.2); }
        }
    </style>
</head>
<body>

    <div id="map-bg"><div class="map-darkener"></div></div>
    <div id="narrative-container"><div id="typewriter"></div></div>
    
    <div id="poi-link" onclick="goToGame()"><div id="light-spot"></div></div>
    
    <canvas id="fog-canvas"></canvas>
    
    <div id="overlay-hint">Há uma saída oculta na neblina.<br>Limpe o centro para descobrir a história.</div>

    <script>
        const canvas = document.getElementById('fog-canvas');
        const ctx = canvas.getContext('2d');
        const typewriterEl = document.getElementById('typewriter');
        const poi = document.getElementById('poi-link');
        const overlayHint = document.getElementById('overlay-hint');
        
        let isDrawing = false;
        let typingStarted = false;
        let audioCtx;

        const text = "O que antes era um lugar de risos e encontros, hoje é um deserto de concreto e portões trancados. O Parque parou. A gestão perdeu o controle entre papéis e conflitos que parecem não ter fim.\n\nComo autoridade técnica, o destino está em suas mãos. Você pode seguir o caminho de sempre — o da punição rígida — ou pode descobrir uma nova trilha: onde a conversa destrava a burocracia.\n\nSiga a luz.";

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = "#2a2a2a"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function playTypewriterSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // Som seco de batida mecânica
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.02);
            gain.gain.setValueAtTime(0.07, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.02);

            // Ruído metálico de fundo
            const noise = audioCtx.createOscillator();
            const noiseGain = audioCtx.createGain();
            noise.type = 'sawtooth';
            noise.frequency.setValueAtTime(800 + Math.random() * 200, now);
            noiseGain.gain.setValueAtTime(0.02, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.01);
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start();
            noise.stop(now + 0.01);
        }

        function startTyping() {
            if (typingStarted) return;
            typingStarted = true;
            let i = 0;
            function type() {
                if (i < text.length) {
                    const char = text.charAt(i);
                    typewriterEl.innerHTML += char === "\n" ? "<br>" : char;
                    if (char !== " " && char !== "\n") playTypewriterSound();
                    i++;
                    setTimeout(type, 50 + Math.random() * 30);
                }
            }
            type();
        }

        function checkAreaPurity() {
            // Verifica a área central para o Texto
            const centerData = ctx.getImageData(canvas.width/4, canvas.height/4, canvas.width/2, canvas.height/2);
            let centerCleaned = 0;
            for (let i = 3; i < centerData.data.length; i += 4) {
                if (centerData.data[i] === 0) centerCleaned++;
            }
            if ((centerCleaned / (centerData.data.length / 4)) > 0.45) startTyping();

            // Verifica a área do Link (Brilho) - Requer ~95% de limpeza
            const pRect = poi.getBoundingClientRect();
            // Pegamos a área exata do link no canvas
            const poiData = ctx.getImageData(pRect.left, pRect.top, pRect.width, pRect.height);
            let poiCleaned = 0;
            const step = 4; // Amostragem pixel a pixel para precisão
            for (let i = 3; i < poiData.data.length; i += step) {
                if (poiData.data[i] === 0) poiCleaned++;
            }
            
            const purity = poiCleaned / (poiData.data.length / 4);
            if (purity > 0.95) { // Só ativa se estiver quase totalmente limpo
                poi.classList.add('full-revealed');
            }
        }

        function scratch(e) {
            if (!isDrawing) return;
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 100, 0, Math.PI * 2);
            ctx.fill();

            overlayHint.style.opacity = '0';
            checkAreaPurity();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });

        function goToGame() { window.location.href = "pipoca.html"; }
        window.onload = init;
        window.onresize = init;
    </script>
</body>
</html>
