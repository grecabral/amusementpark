<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta TCE-PE | Parque do Consensualismo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');

        :root {
            --tce-blue: #003366;
            --tce-gold: #ffcc00;
        }

        body {
            margin: 0; padding: 20px 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
        }

        .header-title { text-align: center; z-index: 10; margin-bottom: 20px; }
        .header-title h1 { font-family: 'Bungee', cursive; font-size: 2.2rem; text-shadow: 0 0 15px var(--tce-gold); }

        .wheel-outer {
            position: relative; width: 480px; height: 480px;
            background: #222; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 12px solid #111; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .light {
            position: absolute; width: 12px; height: 12px;
            background: #fff; border-radius: 50%; z-index: 20;
            animation: blink 0.6s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.3; box-shadow: 0 0 2px #fff; }
            to { opacity: 1; box-shadow: 0 0 15px var(--tce-gold); }
        }

        .wheel-main {
            width: 94%; height: 94%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 5px solid #000;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #e74c3c 0deg 45deg,
                #27ae60 45deg 90deg,
                #f1c40f 90deg 135deg,
                #2980b9 135deg 180deg,
                #9b59b6 180deg 225deg,
                #e67e22 225deg 270deg,
                #34495e 270deg 315deg,
                #16a085 315deg 360deg
            );
        }

        .idle-animation { animation: rotateIdle 20s linear infinite; }
        @keyframes rotateIdle { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ORIENTAÇÃO RADIAL DO TEXTO */
        .labels-container {
            position: absolute; width: 100%; height: 100%;
        }

        .label {
            position: absolute;
            top: 50%; left: 50%;
            width: 180px; /* Distância do centro à borda */
            height: 30px;
            transform-origin: 0% 50%; /* Rotaciona a partir do centro da roleta */
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Empurra o texto para a borda */
            pointer-events: none;
        }

        .label span {
            font-family: 'Bungee', cursive;
            font-size: 11px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            text-transform: uppercase;
            white-space: nowrap;
            padding-right: 15px;
        }

        /* Posicionamento radial: Metade de 45° é 22.5° */
        .l1 { transform: rotate(-67.5deg); }
        .l2 { transform: rotate(-22.5deg); }
        .l3 { transform: rotate(22.5deg); }
        .l3 span { color: #333; text-shadow: none; }
        .l4 { transform: rotate(67.5deg); }
        .l5 { transform: rotate(112.5deg); } /* PARQUE DIVERSÃO */
        .l6 { transform: rotate(157.5deg); }
        .l7 { transform: rotate(202.5deg); }
        .l8 { transform: rotate(247.5deg); }

        .center-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85px; height: 85px;
            background: var(--tce-blue); border: 4px solid var(--tce-gold);
            border-radius: 50%; z-index: 100; cursor: pointer;
            color: white; font-family: 'Bungee';
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--tce-gold);
            text-align: center; line-height: 1.1; font-size: 14px;
        }

        .pointer {
            position: absolute; top: -25px; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 55px; background: #ff4757;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 110; border: 2px solid #fff;
        }

        .content-card {
            margin: 30px auto; width: 90%; max-width: 500px;
            background: white; color: #333; padding: 25px;
            border-radius: 20px; text-align: center;
            display: none; z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .btn-action {
            background: #e67e22; color: white; border: none;
            padding: 15px 30px; border-radius: 30px;
            font-weight: bold; cursor: pointer; margin-top: 15px;
            font-family: 'Bungee'; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header-title">
        <p style="color: var(--tce-gold); font-weight: bold; margin: 0; letter-spacing: 2px;">TCE-PE APRESENTA</p>
        <h1>Parque do Consensualismo</h1>
    </div>

    <div id="wheel-screen">
        <div class="wheel-outer" id="lights-container">
            <div class="pointer"></div>
            <div class="center-btn" onclick="spinNow()">GIRAR<br>ROLETA</div>
            
            <div class="wheel-main idle-animation" id="wheel-element">
                <div class="labels-container">
                    <div class="label l1"><span>Arena PE</span></div>
                    <div class="label l2"><span>Transporte</span></div>
                    <div class="label l3"><span>Resíduos</span></div>
                    <div class="label l4"><span>Saneamento</span></div>
                    <div class="label l5"><span>Parque Diversão</span></div>
                    <div class="label l6"><span>Surpresa</span></div>
                    <div class="label l7"><span>Surpresa</span></div>
                    <div class="label l8"><span>Surpresa</span></div>
                </div>
            </div>
        </div>

        <div id="result-card" class="content-card">
            <h2 id="res-title" style="color: var(--tce-blue); margin: 0; font-family: 'Bungee';"></h2>
            <p id="res-desc" style="margin: 15px 0; font-weight: bold; color: #d35400; line-height: 1.4;"></p>
            <button class="btn-action" onclick="window.location.href='parque.html'">INVESTIGAR AGORA</button>
        </div>
    </div>

    <script>
        // Criar Luzes
        const lContainer = document.getElementById('lights-container');
        for (let i = 0; i < 24; i++) {
            const light = document.createElement('div');
            light.className = 'light';
            const angle = (i * 15) * (Math.PI / 180);
            light.style.left = (240 + 230 * Math.cos(angle) - 6) + 'px';
            light.style.top = (240 + 230 * Math.sin(angle) - 6) + 'px';
            lContainer.appendChild(light);
        }

        let isSpinning = false;
        
        function spinNow() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('result-card').style.display = "none";

            const wheel = document.getElementById('wheel-element');
            wheel.classList.remove('idle-animation');
            wheel.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            
            setTimeout(() => {
                wheel.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)';
                
                /*
                  Para a Fatia 5 (Parque) parar no topo (0°):
                  A Fatia 5 está centrada em 202.5°.
                  A roleta gira horária. O ângulo para parar o 202.5 no topo é:
                  Giro = 360 - 202.5 = 157.5 graus.
                */
                const extraSpins = 5; 
                const stopAngle = (extraSpins * 360) + 157.5; 
                
                wheel.style.transform = `rotate(${stopAngle}deg)`;
            }, 50);

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('res-title').innerText = "Parque de Diversões";
                document.getElementById('res-desc').innerText = "ALERTA: O Parque de Diversões apresenta irregularidades críticas na gestão. Você está sendo enviado para uma inspeção imediata...";
                document.getElementById('result-card').style.display = "block";
                document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });
            }, 4100);
        }
    </script>
</body>
</html>
